name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 🛠️ 设置 Gradle 并缓存
        uses: gradle/actions/setup-gradle@v3

      - name: 📦 安装 Android SDK 34
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: 🔧 给 gradlew 加执行权限
        run: chmod +x gradlew
        
      - name: 🧹 修复 gradlew BOM 编码
        run: sed -i '1s/^\xEF\xBB\xBF//' gradlew
        
      - name: 🏗️ 构建 Debug APK
        run: ./gradlew assembleDebug --console=plain --no-daemon

      - name: 📦 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: GameSpinner-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
